version: '3.8'

services:
  # ==================== 前端 ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000/ws
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - doc-agent

  # ==================== 后端 API ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8001
      - DIFY_API_URL=http://dify:5001/v1
      - UNSTRUCTURED_API_URL=http://unstructured:8000
    volumes:
      - ./data/uploads:/app/uploads
      - ./data/output:/app/output
      - ./data/assets:/app/assets
    depends_on:
      - redis
      - minio
      - chroma
    restart: unless-stopped
    networks:
      - doc-agent

  # ==================== 文档解析服务 ====================
  unstructured:
    image: quay.io/unstructured-io/unstructured-api:latest
    ports:
      - "8002:8000"
    environment:
      - UNSTRUCTURED_API_KEY=
    volumes:
      - ./data/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - doc-agent

  # ==================== Dify 工作流引擎 ====================
  dify-api:
    image: langgenius/dify-api:0.15.0
    ports:
      - "5001:5001"
    environment:
      - MODE=api
      - SECRET_KEY=dify-secret-key-change-me
      - CONSOLE_WEB_URL=http://localhost:3000
      - SERVICE_API_URL=http://localhost:5001
      - APP_WEB_URL=http://localhost:3000
      - DB_USERNAME=postgres
      - DB_PASSWORD=dify-postgres-password
      - DB_HOST=dify-db
      - DB_PORT=5432
      - DB_DATABASE=dify
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=1
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/api/storage
    volumes:
      - dify-storage:/app/api/storage
    depends_on:
      - dify-db
      - redis
    restart: unless-stopped
    networks:
      - doc-agent

  dify-web:
    image: langgenius/dify-web:0.15.0
    ports:
      - "3001:3000"
    environment:
      - CONSOLE_API_URL=http://localhost:5001
      - APP_API_URL=http://localhost:5001
    restart: unless-stopped
    networks:
      - doc-agent

  dify-worker:
    image: langgenius/dify-api:0.15.0
    environment:
      - MODE=worker
      - SECRET_KEY=dify-secret-key-change-me
      - DB_USERNAME=postgres
      - DB_PASSWORD=dify-postgres-password
      - DB_HOST=dify-db
      - DB_PORT=5432
      - DB_DATABASE=dify
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=1
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/api/storage
    volumes:
      - dify-storage:/app/api/storage
    depends_on:
      - dify-db
      - redis
    restart: unless-stopped
    networks:
      - doc-agent

  dify-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=dify-postgres-password
      - POSTGRES_DB=dify
    volumes:
      - dify-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - doc-agent

  # ==================== 基础设施 ====================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - doc-agent

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - doc-agent

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma-data:/chroma/chroma
    restart: unless-stopped
    networks:
      - doc-agent

  # ==================== Nginx 反向代理 ====================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - doc-agent

volumes:
  redis-data:
  minio-data:
  chroma-data:
  dify-storage:
  dify-db-data:

networks:
  doc-agent:
    driver: bridge
