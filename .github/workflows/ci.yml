name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-v4.txt
          pip install pytest pytest-asyncio ruff
      - name: Lint with ruff
        run: cd backend && ruff check app/ tests/
      - name: Run tests
        run: cd backend && pytest tests/ -v --tb=short
        env:
          REDIS_URL: redis://localhost:6379/0

  frontend-lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Lint
        run: cd frontend && npx next lint
      - name: Build
        run: cd frontend && npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t magazine-backend ./backend
      - name: Build frontend image
        run: docker build -t magazine-frontend ./frontend