name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements-v4.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-v4.txt
          pip install ruff bandit mypy

      - name: Ruff format check
        run: ruff format --check app/ tests/

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: Bandit security scan
        run: bandit -r app/ -ll -ii --skip B101,B311

  backend-test:
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements-v4.txt

      - name: Install dependencies
        run: pip install -r requirements-v4.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: sqlite:///:memory:
          REDIS_URL: redis://localhost:6379/0
          API_KEY_ENCRYPTION_KEY: test-key-for-ci-minimum-16-bytes
        run: python -m pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=40

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t hongtian-docs-backend ./backend

      - name: Build frontend image
        run: docker build -t hongtian-docs-frontend ./frontend
