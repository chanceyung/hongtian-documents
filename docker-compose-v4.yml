version: '3.8'

# V4 架构：精简为 4 个核心服务
# 去掉了 V1 的 Dify(5容器)、Unstructured、Chroma、MinIO
# AI 处理全部通过 GLM-5 API，无需本地模型

services:
  # ==================== 前端（Presenton Next.js） ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - magazine-agent

  # ==================== 后端 API（Presenton FastAPI + 智能体） ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # 基础
      - APP_NAME=Magazine Document Agent
      - DEBUG=false
      - DATABASE_URL=sqlite:///./app_data/magazine.db
      - REDIS_URL=redis://redis:6379/0

      # 文件存储
      - UPLOAD_DIR=/app/data/uploads
      - OUTPUT_DIR=/app/data/output
      - ASSETS_DIR=/app/data/assets
      - TEMPLATE_DIR=/app/app/templates

      # GLM-5 API
      - LLM=custom
      - CUSTOM_LLM_URL=https://open.bigmodel.cn/api/paas/v4
      - CUSTOM_MODEL=glm-5-pro
      - CUSTOM_LLM_API_KEY=${GLM_API_KEY}

      # 素材补充
      - IMAGE_PROVIDER=pexels
      - PEXELS_API_KEY=${PEXELS_API_KEY:-}
      - UNSPLASH_ACCESS_KEY=${UNSPLASH_ACCESS_KEY:-}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN:-}

      # 保真校验
      - FIDELITY_THRESHOLD=0.95
      - MAX_REPAIR_ATTEMPTS=2
      - DOCILING_TIMEOUT=300

      # Playwright
      - PLAYWRIGHT_HEADLESS=true
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/output:/app/data/output
      - ./data/assets:/app/data/assets
      - ./data/app_data:/app/app_data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - magazine-agent

  # ==================== Redis（API Key 会话 + 任务队列） ====================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - magazine-agent

  # ==================== Nginx 反向代理 ====================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - magazine-agent

volumes:
  redis-data:

networks:
  magazine-agent:
    driver: bridge
