version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - magazine-agent

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=Magazine Document Agent
      - DEBUG=false
      - DATABASE_URL=sqlite:///./app_data/magazine.db
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/app/data/uploads
      - OUTPUT_DIR=/app/data/output
      - ASSETS_DIR=/app/data/assets
      - TEMPLATE_DIR=/app/app/templates
      - LLM=custom
      - CUSTOM_LLM_URL=https://open.bigmodel.cn/api/paas/v4
      - CUSTOM_MODEL=glm-4-flash
      - CUSTOM_LLM_API_KEY=${GLM_API_KEY}
      - IMAGE_PROVIDER=pexels
      - PEXELS_API_KEY=${PEXELS_API_KEY:-}
      - UNSPLASH_ACCESS_KEY=${UNSPLASH_ACCESS_KEY:-}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN:-}
      - FIDELITY_THRESHOLD=0.95
      - MAX_REPAIR_ATTEMPTS=2
      - DOCILING_TIMEOUT=300
      - PLAYWRIGHT_HEADLESS=true
      - CORS_ORIGINS=['http://localhost:3000','http://localhost:8000','http://localhost']
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/output:/app/data/output
      - ./data/assets:/app/data/assets
      - ./data/app_data:/app/app_data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - magazine-agent

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - magazine-agent

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    read_only: true
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - magazine-agent

volumes:
  redis-data:

networks:
  magazine-agent:
    driver: bridge