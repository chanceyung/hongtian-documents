<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" style="background-color: #ffffff;">
  <!-- 左侧紫色装饰条 -->
  <rect x="0" y="0" width="6" height="1080" fill="#6366f1" style=""/>

  <!-- 顶部装饰线 -->
  <line x1="140" y1="100" x2="1920" y2="100" stroke="#e2e8f0" stroke-width="2" style=""/>

  <!-- 标题 -->
  <text x="140" y="180" font-size="48" font-weight="bold" fill="#1e1b4b" style="font-family: Arial, sans-serif; font-weight: bold;" data-placeholder="title">页面标题</text>

  <!-- 正文内容 -->
  <text x="140" y="280" font-size="24" fill="#475569" style="font-family: Arial, sans-serif;" data-placeholder="content">正文内容将显示在这里。这是第一段文字，可以包含较长的描述性内容。</text>

  <text x="140" y="350" font-size="24" fill="#475569" style="font-family: Arial, sans-serif;" data-placeholder="content_2">这是第二段文字内容，继续展示更多的文本信息。</text>

  <text x="140" y="420" font-size="24" fill="#475569" style="font-family: Arial, sans-serif;" data-placeholder="content_3">这是第三段文字内容，用于展示完整的文本布局。</text>

  <!-- Logo (右下角 - Black for light background) -->
  <image x="1750" y="1010" width="150" height="50" href="../../../../logo/Black.png" preserveAspectRatio="xMidYMid meet" style=""/>
</svg>