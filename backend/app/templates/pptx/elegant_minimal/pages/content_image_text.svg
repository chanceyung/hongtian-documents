<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" style="background-color: #ffffff;">
  <!-- 左侧紫色装饰条 -->
  <rect x="0" y="0" width="6" height="1080" fill="#6366f1" style=""/>

  <!-- 顶部装饰线 -->
  <line x1="140" y1="100" x2="1920" y2="100" stroke="#e2e8f0" stroke-width="2" style=""/>

  <!-- 标题 -->
  <text x="140" y="180" font-size="48" font-weight="bold" fill="#1e1b4b" style="font-family: Arial, sans-serif; font-weight: bold;" data-placeholder="title">图文混排页面</text>

  <!-- 左侧图片区域 (40%) -->
  <rect x="140" y="250" width="640" height="480" fill="#f1f5f9" rx="8" style=""/>
  <image x="140" y="250" width="640" height="480" href="" preserveAspectRatio="xMidYMid slice" style="" data-placeholder="image"/>

  <!-- 右侧文字区域 (60%) -->
  <text x="840" y="320" font-size="28" font-weight="bold" fill="#1e1b4b" style="font-family: Arial, sans-serif; font-weight: bold;" data-placeholder="heading">标题或说明文字</text>

  <text x="840" y="400" font-size="24" fill="#475569" style="font-family: Arial, sans-serif;" data-placeholder="content">这里是详细的文字说明内容，可以包含多段描述性文字。左侧的图片与右侧的文字形成良好的视觉平衡。</text>

  <text x="840" y="480" font-size="24" fill="#475569" style="font-family: Arial, sans-serif;" data-placeholder="content_2">继续展示更多的文本信息，确保布局清晰易读。</text>

  <text x="840" y="560" font-size="24" fill="#475569" style="font-family: Arial, sans-serif;" data-placeholder="content_3">这是最后一段文字内容，完成整体排版。</text>

  <!-- Logo (右下角 - Black for light background) -->
  <image x="1750" y="1010" width="150" height="50" href="../../../../logo/Black.png" preserveAspectRatio="xMidYMid meet" style=""/>
</svg>