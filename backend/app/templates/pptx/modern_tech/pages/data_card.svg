<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <!-- Background -->
  <rect width="1920" height="1080" fill="#1a1a2e"/>

  <!-- Top Decorative Line -->
  <rect x="0" y="0" width="1920" height="4" fill="#2E86AB"/>

  <!-- Side Accent Bar -->
  <rect x="0" y="4" width="8" height="1076" fill="#e94560"/>

  <!-- Heading -->
  <text x="80" y="100" data-placeholder="heading" fill="#ffffff" font-family="Arial, sans-serif" font-size="40" font-weight="bold">
    Data Overview
  </text>

  <!-- Decorative Line Under Heading -->
  <rect x="80" y="120" width="150" height="4" fill="#2E86AB" rx="2"/>

  <!-- Data Card 1 -->
  <rect x="80" y="200" width="540" height="350" fill="#2E86AB" opacity="0.3" rx="15"/>
  <rect x="80" y="200" width="540" height="350" fill="none" stroke="#2E86AB" stroke-width="3" rx="15"/>

  <!-- Card 1 Value -->
  <text x="200" y="380" data-placeholder="value1" fill="#ffffff" font-family="Arial, sans-serif" font-size="64" font-weight="bold" text-anchor="middle">
    0
  </text>

  <!-- Card 1 Label -->
  <text x="350" y="450" data-placeholder="label1" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" opacity="0.9" text-anchor="middle">
    Label 1
  </text>

  <!-- Card 1 Decorative Accent -->
  <circle cx="130" cy="240" r="20" fill="#e94560" opacity="0.6"/>
  <circle cx="570" cy="510" r="15" fill="#ffffff" opacity="0.2"/>

  <!-- Data Card 2 -->
  <rect x="690" y="200" width="540" height="350" fill="#2E86AB" opacity="0.3" rx="15"/>
  <rect x="690" y="200" width="540" height="350" fill="none" stroke="#2E86AB" stroke-width="3" rx="15"/>

  <!-- Card 2 Value -->
  <text x="810" y="380" data-placeholder="value2" fill="#ffffff" font-family="Arial, sans-serif" font-size="64" font-weight="bold" text-anchor="middle">
    0
  </text>

  <!-- Card 2 Label -->
  <text x="960" y="450" data-placeholder="label2" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" opacity="0.9" text-anchor="middle">
    Label 2
  </text>

  <!-- Card 2 Decorative Accent -->
  <circle cx="740" cy="240" r="20" fill="#e94560" opacity="0.6"/>
  <circle cx="1180" cy="510" r="15" fill="#ffffff" opacity="0.2"/>

  <!-- Data Card 3 -->
  <rect x="1300" y="200" width="540" height="350" fill="#2E86AB" opacity="0.3" rx="15"/>
  <rect x="1300" y="200" width="540" height="350" fill="none" stroke="#2E86AB" stroke-width="3" rx="15"/>

  <!-- Card 3 Value -->
  <text x="1420" y="380" data-placeholder="value3" fill="#ffffff" font-family="Arial, sans-serif" font-size="64" font-weight="bold" text-anchor="middle">
    0
  </text>

  <!-- Card 3 Label -->
  <text x="1570" y="450" data-placeholder="label3" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" opacity="0.9" text-anchor="middle">
    Label 3
  </text>

  <!-- Card 3 Decorative Accent -->
  <circle cx="1350" cy="240" r="20" fill="#e94560" opacity="0.6"/>
  <circle cx="1790" cy="510" r="15" fill="#ffffff" opacity="0.2"/>

  <!-- Bottom Decorative Section -->
  <rect x="80" y="620" width="1760" height="400" fill="#16213e" opacity="0.5" rx="15"/>

  <!-- Decorative Elements -->
  <circle cx="200" cy="750" r="40" fill="#2E86AB" opacity="0.2"/>
  <circle cx="1600" cy="900" r="60" fill="#e94560" opacity="0.15"/>

  <line x1="100" y1="850" x2="500" y2="850" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
  <line x1="100" y1="900" x2="400" y2="900" stroke="#2E86AB" stroke-width="2" opacity="0.3"/>

  <!-- Tech Pattern Dots -->
  <circle cx="1500" cy="700" r="5" fill="#ffffff" opacity="0.3"/>
  <circle cx="1520" cy="700" r="5" fill="#ffffff" opacity="0.3"/>
  <circle cx="1540" cy="700" r="5" fill="#ffffff" opacity="0.3"/>
  <circle cx="1560" cy="700" r="5" fill="#ffffff" opacity="0.3"/>
  <circle cx="1500" cy="720" r="5" fill="#ffffff" opacity="0.3"/>
  <circle cx="1520" cy="720" r="5" fill="#ffffff" opacity="0.3"/>
  <circle cx="1540" cy="720" r="5" fill="#ffffff" opacity="0.3"/>
  <circle cx="1560" cy="720" r="5" fill="#ffffff" opacity="0.3"/>

  <!-- Page Number Placeholder -->
  <text x="1800" y="1050" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" opacity="0.6">
    1
  </text>

  <!-- Logo -->
  <image x="1750" y="20" width="150" height="50" href="../../../../logo/White.png" data-placeholder="logo" preserveAspectRatio="xMidYMid meet"/>
</svg>