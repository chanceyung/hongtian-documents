<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sideGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="#1a1a2e"/>
  <rect width="960" height="1080" fill="url(#sideGradient)" opacity="0.6"/>

  <!-- Decorative Circles -->
  <circle cx="120" cy="900" r="80" fill="#e94560" opacity="0.2"/>
  <circle cx="200" cy="100" r="120" fill="#e94560" opacity="0.15"/>
  <circle cx="800" cy="980" r="60" fill="#2E86AB" opacity="0.3"/>

  <!-- Decorative Lines -->
  <line x1="0" y1="1080" x2="300" y2="800" stroke="#e94560" stroke-width="2" opacity="0.3"/>
  <line x1="50" y1="0" x2="350" y2="200" stroke="#2E86AB" stroke-width="3" opacity="0.4"/>
  <line x1="900" y1="0" x2="900" y2="1080" stroke="#ffffff" stroke-width="1" opacity="0.1"/>

  <!-- Title Section -->
  <text x="80" y="420" data-placeholder="title" fill="#ffffff" font-family="Arial, sans-serif" font-size="56" font-weight="bold">
    Your Title Here
  </text>

  <text x="80" y="500" data-placeholder="subtitle" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" opacity="0.8">
    Your Subtitle Here
  </text>

  <!-- Cover Image Placeholder -->
  <rect x="960" y="100" width="860" height="880" fill="#2E86AB" opacity="0.2" rx="10"/>
  <image x="960" y="100" width="860" height="880" href="" data-placeholder="cover_image" preserveAspectRatio="xMidYMid slice"/>

  <!-- Logo -->
  <image x="1750" y="20" width="150" height="50" href="../../../../logo/White.png" data-placeholder="logo" preserveAspectRatio="xMidYMid meet"/>

  <!-- Decorative Accent Elements -->
  <rect x="80" y="600" width="100" height="4" fill="#e94560" rx="2"/>
  <rect x="80" y="620" width="60" height="4" fill="#2E86AB" rx="2"/>

  <!-- Tech Pattern Dots -->
  <circle cx="500" cy="800" r="4" fill="#ffffff" opacity="0.3"/>
  <circle cx="520" cy="800" r="4" fill="#ffffff" opacity="0.3"/>
  <circle cx="540" cy="800" r="4" fill="#ffffff" opacity="0.3"/>
  <circle cx="560" cy="800" r="4" fill="#ffffff" opacity="0.3"/>
  <circle cx="500" cy="820" r="4" fill="#ffffff" opacity="0.3"/>
  <circle cx="520" cy="820" r="4" fill="#ffffff" opacity="0.3"/>
  <circle cx="540" cy="820" r="4" fill="#ffffff" opacity="0.3"/>
  <circle cx="560" cy="820" r="4" fill="#ffffff" opacity="0.3"/>
</svg>