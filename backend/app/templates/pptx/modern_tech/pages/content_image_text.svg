<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <!-- Background -->
  <rect width="1920" height="1080" fill="#ffffff"/>

  <!-- Top Decorative Line -->
  <rect x="0" y="0" width="1920" height="4" fill="#2E86AB"/>

  <!-- Side Accent Bar -->
  <rect x="0" y="4" width="8" height="1076" fill="#e94560"/>

  <!-- Left Section - Text Content -->
  <text x="80" y="120" data-placeholder="heading" fill="#333333" font-family="Arial, sans-serif" font-size="36" font-weight="bold">
    Your Heading Here
  </text>

  <!-- Decorative Line Under Heading -->
  <rect x="80" y="140" width="120" height="4" fill="#2E86AB" rx="2"/>

  <!-- Body Text -->
  <text x="80" y="220" data-placeholder="body" fill="#555555" font-family="Arial, sans-serif" font-size="20">
    Your body text here. This is a placeholder for your content on the left side of the page.
  </text>

  <!-- Decorative Elements in Left Section -->
  <circle cx="100" cy="400" r="30" fill="#2E86AB" opacity="0.15"/>
  <circle cx="200" cy="450" r="20" fill="#e94560" opacity="0.15"/>

  <rect x="80" y="700" width="80" height="3" fill="#2E86AB" opacity="0.4" rx="1.5"/>
  <rect x="80" y="720" width="50" height="3" fill="#e94560" opacity="0.4" rx="1.5"/>

  <!-- Divider Line -->
  <line x1="960" y1="4" x2="960" y2="1076" stroke="#e94560" stroke-width="2" opacity="0.2"/>

  <!-- Right Section - Image -->
  <rect x="1000" y="100" width="840" height="880" fill="#2E86AB" opacity="0.1" rx="10"/>
  <image x="1000" y="100" width="840" height="880" href="" data-placeholder="image" preserveAspectRatio="xMidYMid slice"/>

  <!-- Page Number Placeholder -->
  <text x="1800" y="1050" fill="#999999" font-family="Arial, sans-serif" font-size="16" opacity="0.6">
    1
  </text>

  <!-- Logo -->
  <image x="1750" y="1010" width="150" height="50" href="../../../../logo/Black.png" data-placeholder="logo" preserveAspectRatio="xMidYMid meet"/>
</svg>