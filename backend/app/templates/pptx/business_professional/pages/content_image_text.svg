<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" style="background-color: #f8f9fa;">
  <!-- 顶部深蓝色条 -->
  <rect x="0" y="0" width="1920" height="60" fill="#1e3a5f" style=""/>

  <!-- Logo (顶部深蓝条内 - White) -->
  <image x="1720" y="5" width="150" height="50" href="../../../../logo/White.png" preserveAspectRatio="xMidYMid meet" style=""/>

  <!-- 标题左侧金色竖线装饰 -->
  <line x1="140" y1="140" x2="140" y2="240" stroke="#c9a84c" stroke-width="6" style=""/>

  <!-- 标题 -->
  <text x="180" y="200" font-size="48" font-weight="bold" fill="#1a202c" style="font-family: Arial, sans-serif; font-weight: bold;" data-placeholder="title">图文混排页面</text>

  <!-- 左侧图片区域 (40%) - 金色边框 -->
  <rect x="140" y="290" width="640" height="480" fill="none" stroke="#c9a84c" stroke-width="4" rx="12" style=""/>
  <image x="144" y="294" width="632" height="472" href="" preserveAspectRatio="xMidYMid slice" style="" data-placeholder="image"/>

  <!-- 右侧文字区域 (60%) -->
  <text x="840" y="360" font-size="28" font-weight="bold" fill="#1a202c" style="font-family: Arial, sans-serif; font-weight: bold;" data-placeholder="heading">标题或说明文字</text>

  <text x="840" y="440" font-size="24" fill="#4a5568" style="font-family: Arial, sans-serif;" data-placeholder="content">这里是详细的文字说明内容，可以包含多段描述性文字。左侧的图片与右侧的文字形成良好的视觉平衡。</text>

  <text x="840" y="520" font-size="24" fill="#4a5568" style="font-family: Arial, sans-serif;" data-placeholder="content_2">继续展示更多的文本信息，确保布局清晰易读。</text>

  <text x="840" y="600" font-size="24" fill="#4a5568" style="font-family: Arial, sans-serif;" data-placeholder="content_3">这是最后一段文字内容，完成整体排版。</text>

  <!-- Logo (右下角 - Black for light background) -->
  <image x="1750" y="1010" width="150" height="50" href="../../../../logo/Black.png" preserveAspectRatio="xMidYMid meet" style=""/>
</svg>