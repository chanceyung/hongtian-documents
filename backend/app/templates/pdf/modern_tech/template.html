<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
</style>
</head>
<body>
  <div data-page-type="cover" class="page cover-page">
    <div class="cover-decoration"></div>
    <img src="/logo/Black.png" class="logo" alt="弘天AI">
    <h1 class="cover-title" data-placeholder="title">标题</h1>
    <p class="cover-subtitle" data-placeholder="subtitle">副标题</p>
    <img class="cover-image" data-placeholder="cover_image" src="" alt="">
  </div>

  <div data-page-type="text_only" class="page text-page">
    <div class="top-line"></div>
    <img src="/logo/Black.png" class="logo logo-bottom" alt="弘天AI">
    <h2 class="section-title" data-placeholder="heading">章节标题</h2>
    <div class="section-body" data-placeholder="body">正文内容</div>
  </div>

  <div data-page-type="text_image" class="page text-image-page">
    <div class="top-line"></div>
    <img src="/logo/Black.png" class="logo logo-bottom" alt="弘天AI">
    <div class="text-column">
      <h2 class="section-title" data-placeholder="heading">章节标题</h2>
      <div class="section-body" data-placeholder="body">正文内容</div>
    </div>
    <div class="image-column">
      <img class="section-image" data-placeholder="image" src="" alt="">
    </div>
  </div>

  <div data-page-type="data_card" class="page data-page">
    <img src="/logo/White.png" class="logo" alt="弘天AI">
    <div class="data-card" data-placeholder="data_value_1">
      <div class="data-value">0</div>
      <div class="data-label" data-placeholder="data_label_1">指标</div>
    </div>
    <div class="data-card" data-placeholder="data_value_2">
      <div class="data-value">0</div>
      <div class="data-label" data-placeholder="data_label_2">指标</div>
    </div>
    <div class="data-card" data-placeholder="data_value_3">
      <div class="data-value">0</div>
      <div class="data-label" data-placeholder="data_label_3">指标</div>
    </div>
  </div>
</body>
</html>
