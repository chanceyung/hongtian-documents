[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*

testpaths = .
norecursedirs = .git .venv venv env ENV envs

addopts =
    -v
    --strict-markers
    --tb=short
    --asyncio-mode=auto

markers =
    asyncio: mark test as async test
    slow: mark test as slow running
    integration: mark test as integration test
    unit: mark test as unit test
    parser: mark test related to parser agent
    analyzer: mark test related to analyzer agent
    designer: mark test related to designer agent
    renderer: mark test related to renderer agent
    supplement: mark test related to supplement agent
    fidelity: mark test related to fidelity agent
    workflow: mark test related to workflow
    api: mark test related to API

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ResourceWarning
